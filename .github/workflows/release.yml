name: release

# Phase 1 流水线：编译 Go 核心 + WPF 桌面端，产出双通道制品：
#   - Inno Setup → Hope_Setup.exe（官网 / 自动更新）
#   - MSIX → Hope_<版本>_x64.msix（微软商店 Package URL）
# 发布版本号取自桌面端 Hope.Desktop.csproj 的 <Version>（后端版本独立、无需一致）。
# Release 正文取自 CHANGELOG.md 中与该版本号匹配的小节（### v<版本>）。
# MSIX 身份见 packaging/README.md（HOPE_MSIX_IDENTITY_NAME / HOPE_MSIX_PUBLISHER）。
#
# 触发方式：向 release 分支上的提交打 tag 并推送（tag 形如 v0.13.83）。
# 仅推送到 release 分支、未打 tag 的提交不会发版。

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on release branch
        shell: pwsh
        run: |
          git fetch origin release --quiet
          git merge-base --is-ancestor ${{ github.sha }} origin/release
          if ($LASTEXITCODE -ne 0) {
            throw "Tag ${{ github.ref_name }} 必须打在 release 分支可达的提交上"
          }
          Write-Host "Tag ${{ github.ref_name }} is on release branch"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve desktop version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(.+)$') { throw "Tag 格式应为 vX.Y.Z，当前: $tag" }
          $tagVersion = $Matches[1]
          [xml]$proj = Get-Content src/win-desktop/Hope.Desktop.csproj
          $v = ($proj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1).Trim()
          if (-not $v) { throw "未能在 Hope.Desktop.csproj 中找到 <Version>" }
          if ($v -ne $tagVersion) {
            throw "Tag 版本 ($tagVersion) 与 Hope.Desktop.csproj <Version> ($v) 不一致"
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Desktop (release) version: $v"

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $out = & ./scripts/extract-release-notes.ps1 -Version $version -OutFile release-notes.md
          $found = ($out | Select-String -Pattern '^found=true$' -Quiet)
          if (-not $found) {
            Write-Host "未能抽取 v$version 说明，回退到自动生成"
          }
          "found=$($found.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Build headless (Go)
        working-directory: src/headless
        run: go build -ldflags="-s -w -H=windowsgui" -o "${{ github.workspace }}\stage\hope-headless.exe" .

      - name: Run all tests
        shell: pwsh
        run: ./scripts/test.ps1

      - name: Publish desktop (WPF)
        working-directory: src/win-desktop
        run: dotnet publish Hope.Desktop.csproj -c Release -r win-x64 --self-contained false -o "${{ github.workspace }}\stage"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc /DStageDir="${{ github.workspace }}\stage" /DOutputDir="${{ github.workspace }}\dist" /DAppVersion="${{ steps.ver.outputs.version }}" setup.iss

      - name: Build MSIX (Store)
        shell: pwsh
        env:
          HOPE_MSIX_IDENTITY_NAME: ${{ secrets.HOPE_MSIX_IDENTITY_NAME }}
          HOPE_MSIX_PUBLISHER: ${{ secrets.HOPE_MSIX_PUBLISHER }}
          HOPE_MSIX_PUBLISHER_DISPLAY_NAME: ${{ secrets.HOPE_MSIX_PUBLISHER_DISPLAY_NAME }}
          HOPE_MSIX_DISPLAY_NAME: ${{ secrets.HOPE_MSIX_DISPLAY_NAME }}
        run: |
          & "${{ github.workspace }}\scripts\pack-msix.ps1" `
            -StageDir "${{ github.workspace }}\stage" `
            -OutputDir "${{ github.workspace }}\dist" `
            -Version "${{ steps.ver.outputs.version }}"

      - name: Compute installer SHA-256
        shell: pwsh
        run: |
          $exe = Join-Path "${{ github.workspace }}\dist" "Hope_Setup.exe"
          if (-not (Test-Path $exe)) { throw "未找到安装包 $exe" }
          $hash = (Get-FileHash -Algorithm SHA256 -Path $exe).Hash.ToLower()
          # 写出小写十六进制摘要，供自动更新器校验（格式：<sha256>  Hope_Setup.exe）。
          "$hash  Hope_Setup.exe" | Set-Content -Path "$exe.sha256" -Encoding ascii -NoNewline
          Write-Host "SHA-256: $hash"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hope_Release
          path: |
            dist/*.exe
            dist/*.sha256
            dist/*.msix
            dist/*.msixupload

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Hope ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.notes.outputs.found == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
          files: |
            dist/*.exe
            dist/*.sha256
            dist/*.msix
            dist/*.msixupload
