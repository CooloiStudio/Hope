name: release

# Phase 1 简化流水线：编译 Go 核心 + WPF 桌面端，用 Inno Setup 打成单个安装包。
# 发布版本号取自桌面端 Hope.Desktop.csproj 的 <Version>（后端版本独立、无需一致）。
# Release 正文取自 CHANGELOG.md 中与该版本号匹配的小节（### v<版本>）。
# 不含 UWP / MSIX 签名（见方案文档 §8）。
#
# 触发方式：代码合并 / 推送到 release 分支时自动发版。

on:
  push:
    branches:
      - release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve desktop version
        id: ver
        shell: pwsh
        run: |
          [xml]$proj = Get-Content src/win-desktop/Hope.Desktop.csproj
          $v = ($proj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1).Trim()
          if (-not $v) { throw "未能在 Hope.Desktop.csproj 中找到 <Version>" }
          "version=$v" >> $env:GITHUB_OUTPUT
          "tag=v$v" >> $env:GITHUB_OUTPUT
          Write-Host "Desktop (release) version: $v"

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $found = $false
          if (Test-Path CHANGELOG.md) {
            $lines = Get-Content CHANGELOG.md -Encoding utf8
            $pattern = '^###\s+v' + [regex]::Escape($version) + '(\s|\(|$)'
            $start = -1
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match $pattern) { $start = $i; break }
            }
            if ($start -ge 0) {
              $end = $lines.Count
              for ($j = $start + 1; $j -lt $lines.Count; $j++) {
                if ($lines[$j] -match '^(##|###)\s') { $end = $j; break }
              }
              $body = if ($end -gt $start + 1) { ($lines[($start + 1)..($end - 1)] -join "`n").Trim() } else { "" }
              if (-not [string]::IsNullOrWhiteSpace($body)) {
                Set-Content -Path release-notes.md -Value $body -Encoding utf8
                $found = $true
                Write-Host "已抽取 CHANGELOG v$version 小节作为 Release 正文"
              }
            }
          }
          if (-not $found) {
            Write-Host "未能在 CHANGELOG.md 找到 v$version 小节，回退到自动生成说明"
          }
          "found=$($found.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Build headless (Go)
        working-directory: src/headless
        run: go build -ldflags="-s -w -H=windowsgui" -o "${{ github.workspace }}\stage\hope-headless.exe" .

      - name: Test headless
        working-directory: src/headless
        run: go test ./...

      - name: Publish desktop (WPF)
        working-directory: src/win-desktop
        run: dotnet publish Hope.Desktop.csproj -c Release -r win-x64 --self-contained false -o "${{ github.workspace }}\stage"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc /DStageDir="${{ github.workspace }}\stage" /DOutputDir="${{ github.workspace }}\dist" /DAppVersion="${{ steps.ver.outputs.version }}" setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hope_Setup
          path: dist/*.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Hope ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.notes.outputs.found == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
          files: dist/*.exe
